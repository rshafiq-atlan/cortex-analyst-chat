services:
  - type: web
    name: cortex-analyst-chat
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: SNOWFLAKE_ACCOUNT
      - key: SNOWFLAKE_USER
      - key: SNOWFLAKE_PRIVATE_KEY
      - key: SNOWFLAKE_PRIVATE_KEY_PASSPHRASE
      - key: SNOWFLAKE_WAREHOUSE
      - key: SNOWFLAKE_ROLE
      - key: SNOWFLAKE_AUTHENTICATOR
        value: "keypair"
      - key: ATLAN_HOST
        value: "https://partner-sandbox.atlan.com"
      - key: ATLAN_API_TOKEN
